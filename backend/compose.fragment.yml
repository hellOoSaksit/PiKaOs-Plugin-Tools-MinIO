# Sidecar fragment for the minio tool plugin. Merged into the generated compose when enabled.
services:
  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - ../Backend/.env
    # internal-by-default (Fix-KIT-07): reached over the compose network as `minio:9000` — no host port
    # published (the S3 API nor the 9001 console). Dev host access → add a port from
    # PiKaOs-Docs/docs/architecture/ports.md, never hardcode. Prod exposure is a host-firewall decision.
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  miniodata:
